<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Подключение подписки</title>

<style>

:root{
    --bg:#090f1f;
    --glass:rgba(255,255,255,.08);
    --glass-hover:rgba(255,255,255,.12);
    --border:rgba(255,255,255,.15);
    --text:#ffffff;
    --muted:rgba(255,255,255,.7);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,system-ui,sans-serif;
}

body{
    min-height:100vh;
    padding:20px;

    background:
        radial-gradient(circle at top left,#00d4ff55,transparent 35%),
        radial-gradient(circle at bottom right,#7c3aed66,transparent 35%),
        linear-gradient(135deg,#090f1f,#12192d);

    color:white;
}

.container{
    max-width:950px;
    margin:0 auto;
}

.hero{
    text-align:center;
    padding-top:40px;
    margin-bottom:30px;
}

.hero h1{
    font-size:42px;
    margin-bottom:12px;
}

.hero p{
    color:var(--muted);
}

.glass{
    background:var(--glass);

    backdrop-filter:blur(24px);
    -webkit-backdrop-filter:blur(24px);

    border:1px solid var(--border);

    border-radius:30px;

    padding:28px;

    box-shadow:
        0 10px 40px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.08);
}

.devices{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:16px;
}

.device{
    padding:24px;
    border-radius:22px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.1);

    text-align:center;

    cursor:pointer;

    transition:.25s;
}

.device:hover{
    transform:translateY(-4px);
    background:var(--glass-hover);
}

.icon{
    font-size:46px;
    margin-bottom:10px;
}

.device h3{
    font-size:18px;
}

.instructions{
    display:none;
}

.instructions h2{
    margin-bottom:16px;
}

.instructions ol{
    padding-left:20px;
    color:var(--muted);
    line-height:1.9;
}

.buttons{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:24px;
}

.btn{
    border:none;
    cursor:pointer;

    text-decoration:none;

    color:white;

    padding:14px 22px;

    border-radius:16px;

    background:rgba(255,255,255,.1);

    border:1px solid rgba(255,255,255,.15);

    transition:.25s;
}

.btn:hover{
    transform:translateY(-2px);
    background:rgba(255,255,255,.16);
}

.back{
    margin-top:24px;
    color:#8dc9ff;
    cursor:pointer;
}

footer{
    text-align:center;
    margin-top:28px;
    color:var(--muted);
}

#toast{
    position:fixed;
    left:50%;
    bottom:24px;

    transform:translateX(-50%);

    background:rgba(15,15,15,.95);

    color:white;

    padding:14px 20px;

    border-radius:14px;

    opacity:0;

    transition:.3s;

    pointer-events:none;

    z-index:99999;
}

#toast.show{
    opacity:1;
}

@media (max-width:768px){

    .hero{
        padding-top:20px;
    }

    .hero h1{
        font-size:30px;
    }

    .glass{
        padding:18px;
    }

    .devices{
        grid-template-columns:1fr;
    }

    .buttons{
        flex-direction:column;
    }

    .btn{
        width:100%;
        text-align:center;
    }

}

</style>
</head>
<body>

<div class="container">

    <div class="hero">
        <h1>Подключение подписки</h1>
        <p>Выберите ваше устройство</p>
    </div>

    <div class="glass" id="selector">

        <div class="devices">

            <div class="device" onclick="showInstructions('android')">
                <div class="icon">🤖</div>
                <h3>Android</h3>
            </div>

            <div class="device" onclick="showInstructions('ios')">
                <div class="icon">📱</div>
                <h3>iPhone / iPad</h3>
            </div>

            <div class="device" onclick="showInstructions('windows')">
                <div class="icon">🖥️</div>
                <h3>Windows</h3>
            </div>

            <div class="device" onclick="showInstructions('macos')">
                <div class="icon">🍎</div>
                <h3>macOS</h3>
            </div>

            <div class="device" onclick="showInstructions('linux')">
                <div class="icon">🐧</div>
                <h3>Linux</h3>
            </div>

        </div>

    </div>

    <div class="glass instructions" id="instructions">

        <h2 id="title"></h2>

        <ol id="steps"></ol>

        <div class="buttons">

            <a
                id="downloadBtn"
                class="btn"
                target="_blank">
                Скачать Happ
            </a>

            <button
                class="btn"
                onclick="copySubscription()">
                Подключить подписку
            </button>

            <button
                class="btn"
                onclick="copySubscription2()">
                Подключить подписку 2
            </button>

        </div>

        <div class="back" onclick="goBack()">
            ← Вернуться к выбору устройства
        </div>

    </div>

    <footer>
        После установки Happ нажмите «Подключить подписку»
    </footer>

</div>

<div id="toast"></div>

<script>

const SUBSCRIPTION =
'https://raw.githubusercontent.com/nwl1909/do/refs/heads/main/configibf';

const SUBSCRIPTION2 =
'https://raw.githubusercontent.com/nwl1909/internetbetterfree/refs/heads/main/configibf2?token=GHSAT0AAAAAAD2LT6GNFIQVHJ7IVAKY2DEU2SFI5JA';

const devices = {

    android:{
        title:'Android',
        download:'https://play.google.com/store/apps/details?id=com.happproxy&hl=sv',
        steps:[
            'Откройте Google Play.',
            'Установите приложение Happ.',
            'Запустите Happ.',
            'Вернитесь на сайт.',
            'Нажмите «Подключить подписку».',
            'Вставьте ссылку в Happ.'
        ]
    },

    ios:{
        title:'iPhone / iPad',
        download:'https://apps.apple.com/ru/app/happ-proxy-utility-plus/id6746188973',
        steps:[
            'Откройте App Store.',
            'Установите Happ.',
            'Запустите приложение.',
            'Вернитесь на сайт.',
            'Нажмите «Подключить подписку».',
            'Вставьте ссылку в Happ.'
        ]
    },

    windows:{
        title:'Windows',
        download:'https://github.com/Happ-proxy/happ-desktop/releases/latest/download/setup-Happ.x64.exe',
        steps:[
            'Скачайте Happ для Windows.',
            'Установите программу.',
            'Запустите Happ.',
            'Нажмите «Подключить подписку».',
            'Вставьте ссылку в приложение.'
        ]
    },

    macos:{
        title:'macOS',
        download:'https://apps.apple.com/ru/app/happ-proxy-utility-plus/id6746188973',
        steps:[
            'Скачайте Happ для macOS.',
            'Установите приложение.',
            'Откройте Happ.',
            'Нажмите «Подключить подписку».',
            'Вставьте ссылку в приложение.'
        ]
    },

    linux:{
        title:'Linux',
        download:'https://www.happ.su/happ/',
        steps:[
            'Скачайте версию для Linux.',
            'Установите пакет.',
            'Запустите Happ.',
            'Нажмите «Подключить подписку».',
            'Вставьте ссылку в приложение.'
        ]
    }

};

function showInstructions(device){

    const data = devices[device];

    document.getElementById('selector').style.display='none';

    document.getElementById('instructions').style.display='block';

    document.getElementById('title').textContent =
        'Инструкция для ' + data.title;

    document.getElementById('downloadBtn').href =
        data.download;

    let html='';

    data.steps.forEach(step=>{
        html += `<li>${step}</li>`;
    });

    document.getElementById('steps').innerHTML = html;
}

function goBack(){

    document.getElementById('selector').style.display='block';

    document.getElementById('instructions').style.display='none';
}

async function copySubscription(){

    try{

        await navigator.clipboard.writeText(SUBSCRIPTION);

        showToast(
            'Ссылка подписки скопирована в буфер обмена'
        );

    }catch(error){

        prompt(
            'Скопируйте ссылку вручную:',
            SUBSCRIPTION
        );
    }
}


async function copySubscription2(){
    try{
        await navigator.clipboard.writeText(SUBSCRIPTION2);
        showToast('Вторая ссылка подписки скопирована в буфер обмена');
    }catch(error){
        prompt('Скопируйте ссылку вручную:',SUBSCRIPTION2);
    }
}

function showToast(text){

    const toast =
        document.getElementById('toast');

    toast.textContent = text;

    toast.classList.add('show');

    setTimeout(()=>{
        toast.classList.remove('show');
    },3000);
}

</script>

</body>
</html>
